<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HBnB - Place Details</title>
  <link rel="icon" href="images/icon.png">
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

  <!-- HEADER -->
  <header>
    <div class="header-container">
      <img src="images/logo.png" alt="HBnB Logo" class="logo">
      <a href="login.html" class="login-button" id="login-link">Login</a>
    </div>
  </header>

  <!-- MAIN -->
  <main class="container">

    <!-- PLACE DETAILS -->
    <section id="place-details"></section>

    <!-- ADD REVIEW -->
    <section id="add-review-section" class="add-review-section card" style="display: none;">
      <h2>Add a Review</h2>

      <form id="review-form">

        <!-- hidden place id -->
        <input type="hidden" id="place-id">

        <div class="form-group">
          <label for="review-text">Your Review:</label>
          <textarea id="review-text" rows="4" required></textarea>
        </div>

        <div class="form-group">
          <label for="rating">Rating:</label>
          <select id="rating" required>
            <option value="1">1 Star</option>
            <option value="2">2 Stars</option>
            <option value="3">3 Stars</option>
            <option value="4">4 Stars</option>
            <option value="5">5 Stars</option>
          </select>
        </div>

        <button type="submit" class="submit-button">Submit Review</button>
      </form>
    </section>

    <!-- REVIEWS -->
    <section class="reviews-section">
      <h2>Reviews</h2>
      <div id="reviews-list"></div>
    </section>

  </main>

  <!-- FOOTER -->
  <footer>
    <p>© 2026 HBnB Evolution. All rights reserved.</p>
  </footer>

  <!-- SCRIPTS -->
  <script src="js/utils.js"></script>
  <script src="js/scripts.js"></script>

</body>
</html>
